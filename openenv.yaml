name: warehouse-inventory-management
version: "1.0.0"
description: >
  Multi-product warehouse inventory control under stochastic demand,
  variable lead times, and perishability constraints.
tasks:
  - id: task1_single_product
    difficulty: easy
    max_steps: 30
    reward_range: [0.0, 1.0]
  - id: task2_multi_product
    difficulty: medium
    max_steps: 60
    reward_range: [0.0, 1.0]
  - id: task3_nonstationary
    difficulty: hard
    max_steps: 90
    reward_range: [0.0, 1.0]
api:
  endpoints:
    reset: POST /reset
    step:  POST /step
    state: GET  /state
    tasks: GET  /tasks